services:
    postgres:
        build:
            context: docker/postgres
            dockerfile: Dockerfile
            platforms:
                - "linux/amd64"
            tags:
                - "mock/postgres:1.0.0"

        container_name: postgres
        networks:
            - mock
        ports:
            - "${POSTGRES_PORT}:${POSTGRES_PORT}"
        environment:
            - POSTGRES_DB=${POSTGRES_DB}
            - POSTGRES_PORT=${POSTGRES_PORT}
            - POSTGRES_USER=${POSTGRES_USER}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
        volumes:
            - postgres:/var/lib/postgresql/data
            - ./data/master_db:/master_db
        restart: on-failure

        healthcheck:
            test: [ "CMD-SHELL", "psql -U ${POSTGRES_USER} -d ${POSTGRES_DB} -c 'SELECT 1' || exit 1" ]
            interval: 5s
            timeout: 3s
            retries: 3

        deploy:
            mode: global

            restart_policy:
                condition: on-failure
                delay: 5s
                window: 120s
                max_attempts: 3

    pgadmin:
        build:
            context: docker/pgadmin
            dockerfile: Dockerfile
            platforms:
                - "linux/amd64"
            tags:
                - "mock/pgadmin:1.0.0"

        container_name: pgadmin
        networks:
            - mock
        ports:
            - "${PGADMIN_PORT}:${PGADMIN_PORT}"
        volumes:
            - pgadmin:/var/lib/pgadmin
        environment:
            - PGADMIN_PORT=${PGADMIN_PORT:-80}
            - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD}
            - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL}
            - PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION=true
            - PGADMIN_CONFIG_LOGIN_BANNER="Authorized users only."
            - PGADMIN_CONFIG_CONSOLE_LOG_LEVEL="DEBUG"
        depends_on:
            postgres:
                condition: service_healthy

        restart: unless-stopped
    event_ingest_api:
        build:
            context: .
            dockerfile: docker/event_api/api.Dockerfile
        container_name: event_ingest_api
        networks:
            - mock
        ports:
            - "${EVENT_INGEST_API_PORT}:${EVENT_INGEST_API_PORT}"
        environment:
            - POSTGRES_DB=${POSTGRES_DB}
            - POSTGRES_PORT=${POSTGRES_PORT}
            - POSTGRES_USER=${POSTGRES_USER}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            - POSTGRES_HOST=${POSTGRES_HOST}
        healthcheck:
            test: ["CMD-SHELL", "curl -f http://localhost:${EVENT_INGEST_API_PORT}/health || exit 1"]
            interval: 5s
            timeout: 3s
            retries: 5
            start_period: 5s

    event_data_generator:
        build:
            context: .
            dockerfile: docker/event_api/generator.Dockerfile
        container_name: event_data_generator
        networks:
            - mock
        environment:
            - EVENT_INGEST_API_PORT=${EVENT_INGEST_API_PORT}
            - POSTGRES_DB=${POSTGRES_DB}
            - POSTGRES_PORT=${POSTGRES_PORT}
            - POSTGRES_USER=${POSTGRES_USER}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            - POSTGRES_HOST=${POSTGRES_HOST}
            - AZURE_SQL_CONN_STR=${AZURE_SQL_CONN_STR}
        depends_on:
            event_ingest_api:
                condition: service_healthy
            

volumes:
    pgadmin:
    postgres:

networks:
    mock:
        driver: bridge